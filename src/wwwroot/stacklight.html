<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPC PLC Stacklight</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Georgia, 'Times New Roman', serif;
            background:
                radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 30%),
                linear-gradient(180deg, #16202b 0%, #0b1118 100%);
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            width: min(92vw, 720px);
        }
        h1 {
            font-size: 1.7rem;
            margin-bottom: 1.5rem;
            color: #cad5df;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }
        .stacklight-scene {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(180deg, rgba(38,50,63,0.95), rgba(16,24,32,0.98));
            border: 1px solid rgba(160, 180, 198, 0.15);
            border-radius: 28px;
            padding: 2rem 2rem 1.5rem;
            box-shadow: 0 25px 80px rgba(0,0,0,0.45);
        }
        .stacklight {
            position: relative;
            width: 250px;
            height: 444px;
            margin: 0 auto;
        }
        .stacklight-image {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 14px 28px rgba(0,0,0,0.35));
        }
        .lamp {
            width: 76px;
            height: 56px;
            border-radius: 10px;
            margin: 0;
            transition: all 0.3s ease;
            position: absolute;
            left: 87px;
            border: 1px solid rgba(255,255,255,0.14);
            overflow: hidden;
            mix-blend-mode: screen;
            pointer-events: none;
        }
        .lamp::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 10px;
            background: linear-gradient(180deg, rgba(255,255,255,0.45), transparent 46%);
            pointer-events: none;
        }
        .lamp.off {
            opacity: 0;
            box-shadow: none;
        }
        .lamp.on {
            opacity: 0.95;
        }
        .lamp.blinking {
            animation: blink 0.8s ease-in-out infinite;
        }
        .lamp-red { top: 79px; background: radial-gradient(circle at 50% 40%, rgba(255,120,160,0.98), rgba(255,32,96,0.9) 58%, rgba(120,0,28,0.72) 100%); }
        .lamp-red.on { box-shadow: 0 0 20px rgba(255,60,110,0.92), 0 0 48px rgba(255,20,80,0.45); }
        .lamp-yellow { top: 143px; background: radial-gradient(circle at 50% 40%, rgba(255,196,110,0.98), rgba(255,136,20,0.9) 58%, rgba(110,56,0,0.72) 100%); }
        .lamp-yellow.on { box-shadow: 0 0 20px rgba(255,170,40,0.92), 0 0 48px rgba(255,140,10,0.45); }
        .lamp-green { top: 207px; background: radial-gradient(circle at 50% 40%, rgba(100,255,145,0.98), rgba(16,180,78,0.9) 58%, rgba(0,72,28,0.72) 100%); }
        .lamp-green.on { box-shadow: 0 0 20px rgba(50,255,120,0.92), 0 0 48px rgba(10,210,90,0.42); }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.15; }
        }

        .status-wrap {
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .status {
            font-size: 1.1rem;
            font-weight: 600;
            padding: 8px 24px;
            border-radius: 8px;
            background: #2a2a3e;
            border: 1px solid #3a3a5e;
        }
        .status-normal   { color: #6bff6b; border-color: #00cc00; }
        .status-warning  { color: #ffd93d; border-color: #cc9900; }
        .status-alarm    { color: #ff6b6b; border-color: #cc0000; }
        .status-critical { color: #ff3333; border-color: #cc0000; animation: blink 0.8s ease-in-out infinite; }
        .status-idle     { color: #8892b0; }

        .error {
            color: #ff6b6b;
            margin-top: 1rem;
            font-size: 0.9rem;
        }
        .info {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #555;
        }
        @media (max-width: 760px) {
            .stacklight-scene {
                padding: 1.4rem;
            }
            .stacklight {
                width: 210px;
                height: 373px;
            }
            .lamp { left: 73px; width: 64px; height: 47px; }
            .lamp-red { top: 66px; }
            .lamp-yellow { top: 120px; }
            .lamp-green { top: 173px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>OPC UA Stacklight</h1>
        <div class="stacklight-scene">
            <div class="stacklight">
                <img class="stacklight-image" src="/stacklight.svg" alt="Industrial stacklight" />
                <div id="lamp-red" class="lamp lamp-red off"></div>
                <div id="lamp-yellow" class="lamp lamp-yellow off"></div>
                <div id="lamp-green" class="lamp lamp-green off"></div>
            </div>
            <div class="status-wrap">
                <div id="status" class="status status-idle">Connecting...</div>
                <div id="error" class="error"></div>
                <div class="info">Polling every 500ms from /stacklight API</div>
            </div>
        </div>
    </div>

    <script>
        const SIGNAL_MODE_BLINKING = 1;
        const lampElements = {
            Red:    document.getElementById('lamp-red'),
            Yellow: document.getElementById('lamp-yellow'),
            Green:  document.getElementById('lamp-green')
        };
        const statusEl = document.getElementById('status');
        const errorEl  = document.getElementById('error');

        function getPhaseLabel(lamps) {
            const red    = lamps.find(l => l.name === 'Red');
            const yellow = lamps.find(l => l.name === 'Yellow');
            const green  = lamps.find(l => l.name === 'Green');

            if (green && green.signalOn)  return { text: 'Normal',   css: 'status-normal' };
            if (yellow && yellow.signalOn) return { text: 'Warning',  css: 'status-warning' };
            if (red && red.signalOn && red.signalMode === SIGNAL_MODE_BLINKING)
                return { text: 'Critical', css: 'status-critical' };
            if (red && red.signalOn)  return { text: 'Alarm',    css: 'status-alarm' };
            return { text: 'Idle', css: 'status-idle' };
        }

        function updateUI(data) {
            errorEl.textContent = '';
            data.lamps.forEach(lamp => {
                const el = lampElements[lamp.name];
                if (!el) return;

                el.classList.remove('on', 'off', 'blinking');
                if (lamp.signalOn) {
                    el.classList.add('on');
                    if (lamp.signalMode === SIGNAL_MODE_BLINKING) {
                        el.classList.add('blinking');
                    }
                } else {
                    el.classList.add('off');
                }
            });

            const phase = getPhaseLabel(data.lamps);
            statusEl.textContent = phase.text;
            statusEl.className = 'status ' + phase.css;
        }

        async function poll() {
            try {
                const resp = await fetch('/stacklight');
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const data = await resp.json();
                updateUI(data);
            } catch (e) {
                errorEl.textContent = 'Error: ' + e.message;
            }
        }

        setInterval(poll, 500);
        poll();
    </script>
</body>
</html>
